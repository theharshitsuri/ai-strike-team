# Shipment Status Follow-Up Agent — Config
workflow_name: shipment_followup
description: "Monitor overdue shipments → auto-draft follow-up emails → escalate if unresolved"

extraction:
  model: "gpt-4o"
  temperature: 0.1
  confidence_threshold: 0.80

prompts:
  system: |
    You are a logistics operations agent at a freight brokerage. You write
    professional, concise follow-up emails to carriers requesting shipment
    status updates. You adjust tone based on urgency — polite for first
    contact, firmer for repeated follow-ups, and escalation language for
    critical delays. Always return valid JSON.

  extraction: |
    Extract shipment status information from the following text.
    Return ONLY valid JSON matching this exact schema:
    {{
      "load_id": "string — load/shipment number",
      "carrier": "string — carrier/trucking company name",
      "carrier_contact_email": "string — carrier email if found, or 'N/A'",
      "origin": "string — origin city, state or full address",
      "destination": "string — destination city, state or full address",
      "expected_delivery": "string — YYYY-MM-DD expected delivery date",
      "actual_pickup_date": "string — YYYY-MM-DD actual pickup date or 'N/A'",
      "current_status": "string — current shipment status (e.g., 'in_transit', 'at_origin', 'delayed', 'delivered', 'unknown')",
      "last_update": "string — ISO 8601 datetime of last status update or 'N/A'",
      "last_known_location": "string — last GPS/checkcall location or 'N/A'",
      "customer_name": "string — end customer/consignee name or 'N/A'",
      "commodity": "string — what is being shipped or 'general freight'",
      "is_overdue": "boolean — true if past expected delivery",
      "hours_overdue": "integer — hours past expected delivery (0 if not overdue)",
      "confidence": "float 0.0-1.0",
      "notes": "string — any relevant context"
    }}

    TEXT:
    {input_text}

  followup_email: |
    Write a professional follow-up email to a carrier about a shipment.
    Adjust tone based on attempt number and urgency.

    Shipment details:
    - Load ID: {load_id}
    - Carrier: {carrier}
    - Origin: {origin}
    - Destination: {destination}
    - Expected delivery: {expected_delivery}
    - Hours overdue: {hours_overdue}
    - Last known status: {last_status}
    - Last location: {last_location}
    - Customer: {customer}
    - Follow-up attempt: {attempt_number}

    TONE RULES:
    - Attempt 1: Professional, polite request for status update
    - Attempt 2: Firmer, express concern about the delay
    - Attempt 3+: Urgent, mention escalation to management and potential claims

    Return ONLY valid JSON:
    {{
      "subject": "string — email subject line",
      "body": "string — full email body text",
      "urgency": "string — 'routine', 'urgent', or 'critical'",
      "should_escalate": "boolean — true if attempt >= 3 or hours_overdue > 24",
      "recommended_action": "string — what should happen next",
      "confidence": "float 0.0-1.0"
    }}

thresholds:
  overdue_trigger_hours: 4
  followup_interval_hours: 8
  escalate_after_attempts: 3
  critical_overdue_hours: 24
  customer_notify_after_hours: 12

# Industry Research (FreightPOP, Hiver, CEVA Logistics)
# - 3-8 hours/day spent on shipment follow-up per dispatcher
# - 24-48 hours typical delay in customer communication
# - 15-25% of shipments require some form of follow-up
# - $50-200 cost per customer complaint escalation
# Manual process: 25-45 min/shipment (monitor, identify, research, draft, send, track)
# Automated: <10 sec/shipment (99.6% time reduction)
# ROI: $75-200/day per dispatcher in labor savings

industry_benchmarks:
  dispatcher_followup_hours_per_day: [3, 8]
  communication_delay_hours: [24, 48]
  shipments_requiring_followup_pct: [0.15, 0.25]  # 15-25%
  escalation_cost: [50, 200]  # $
  manual_process_minutes: [25, 45]

followup_triggers:
  - expected_delivery_passed
  - no_check_call_in_hours: 12
  - customer_inquiry_received
  - weather_delay_reported
  - equipment_breakdown
  - driver_hos_violation

tone_escalation:
  attempt_1:
    tone: "professional_polite"
    subject_prefix: "Status Update Request"
    urgency: "routine"
    include_escalation_warning: false
  attempt_2:
    tone: "concerned_firm"
    subject_prefix: "Urgent: Status Update Needed"
    urgency: "urgent"
    include_escalation_warning: true
  attempt_3:
    tone: "escalation"
    subject_prefix: "CRITICAL: Immediate Response Required"
    urgency: "critical"
    include_escalation_warning: true
    cc_management: true

customer_communication:
  notify_after_hours_overdue: 12
  update_frequency_hours: 4
  include_eta_estimate: true
  include_last_known_location: true

escalation_actions:
  - notify_operations_manager
  - create_incident_ticket
  - flag_carrier_performance
  - prepare_claim_documentation

roi_calculation:
  time_saved_per_shipment_minutes: 35  # avg of 25-45
  shipments_per_day: 50
  daily_labor_savings: [75, 200]
  complaint_reduction_pct: 0.20  # 20% fewer complaints
  annual_value: [19500, 52000]
