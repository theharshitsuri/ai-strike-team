# Freight Audit Automation — Config
workflow_name: freight_audit
description: "Compare carrier invoice vs rate confirmation → flag every mismatch → generate professional audit report"

extraction:
  model: "gpt-4o"
  temperature: 0.1
  confidence_threshold: 0.85

prompts:
  system: |
    You are an expert freight audit agent. You extract charge line items from
    carrier invoices and rate confirmations with extreme precision. Every dollar
    matters. Normalize charge descriptions to standard categories.
    Always return valid JSON matching the exact schema.

  invoice_extraction: |
    Extract all charge line items from this carrier INVOICE.
    Return ONLY valid JSON matching this schema:
    {{
      "load_id": "string — load/shipment number",
      "carrier_name": "string — carrier/trucking company",
      "invoice_number": "string — invoice number",
      "invoice_date": "string — YYYY-MM-DD",
      "payment_terms": "string — payment terms (e.g., 'Net 30') or 'N/A'",
      "line_items": [
        {{
          "description": "string — normalized charge type (use exactly: 'linehaul', 'fuel_surcharge', 'detention', 'lumper', 'stop_off', 'accessorial', 'toll', 'layover', 'tarp', 'hazmat', 'reefer', 'other')",
          "amount": "float — dollar amount",
          "detail": "string — any additional detail or notes"
        }}
      ],
      "total_amount": "float — invoice total",
      "currency": "string — 'USD' or other",
      "confidence": "float 0.0-1.0",
      "notes": "string — any anomalies noticed"
    }}

    RULES:
    - Normalize ALL charge descriptions to the standard categories listed above
    - If a charge doesn't fit, use 'accessorial' or 'other'
    - Verify that line items sum to total_amount
    - Flag any suspicious charges in 'notes'

    INVOICE CONTENT:
    {input_text}

  rate_extraction: |
    Extract all charge line items from this RATE CONFIRMATION.
    Return ONLY valid JSON matching this schema:
    {{
      "load_id": "string — load/shipment number",
      "carrier_name": "string — carrier/trucking company",
      "rate_con_number": "string — rate confirmation number",
      "line_items": [
        {{
          "description": "string — normalized charge type (use exactly: 'linehaul', 'fuel_surcharge', 'detention', 'lumper', 'stop_off', 'accessorial', 'toll', 'layover', 'tarp', 'hazmat', 'reefer', 'other')",
          "amount": "float — dollar amount",
          "detail": "string — any additional detail"
        }}
      ],
      "total_amount": "float — rate con total",
      "confidence": "float 0.0-1.0"
    }}

    RATE CONFIRMATION CONTENT:
    {input_text}

thresholds:
  line_item_tolerance: 5.00
  total_tolerance: 10.00
  fuel_pct_tolerance: 0.02
  auto_approve_under: 5.00
  escalate_over: 100.00

# Industry Research (Loop, Invensis, Global Growth Insights)
# - 20-25% of freight invoices contain errors
# - 52-54% of billing errors from accessorial fees
# - 36% of shipping costs can be unnecessary accessories
# - 2-5% of freight spend recoverable through audits
# - 15+ extra days carriers wait when exceptions occur
# Manual process: 75-130 min/invoice (often only 10-20% sampled)
# Automated: <10 sec/invoice with 100% coverage
# ROI: $2,000-10,000/month for mid-size shipper

industry_benchmarks:
  invoice_error_rate: 0.225  # 22.5% average
  accessorial_error_percentage: 0.53  # 53% of errors
  recoverable_spend_percentage: [0.02, 0.05]  # 2-5%
  manual_process_minutes: [75, 130]
  sample_audit_coverage: 0.15  # Only 15% of invoices audited manually
  carrier_payment_delay_days: 15  # Extra days when exceptions occur

common_error_categories:
  - duplicate_charges
  - incorrect_fuel_surcharge
  - unauthorized_accessorials
  - wrong_rate_applied
  - mileage_discrepancy
  - weight_classification_error

roi_calculation:
  time_saved_per_invoice_minutes: 100  # avg of 75-130
  invoices_per_month_small: 100
  invoices_per_month_large: 1000
  monthly_recovery: [2000, 10000]
  annual_value: [24000, 120000]
