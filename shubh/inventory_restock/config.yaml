# Inventory Restock Forecasting Agent — Config
workflow_name: inventory_restock
description: "Analyze sales/inventory data → forecast demand → generate reorder recommendations"

extraction:
  model: "gpt-4o"
  temperature: 0.2
  confidence_threshold: 0.75

prompts:
  system: |
    You are an inventory management agent for wholesale distribution.
    Generate clear, actionable restock recommendations based on demand data.
    Be specific with quantities and timing.

  explain_forecast: |
    Based on these inventory forecasting results, write a brief explanation
    for the operations manager. Be specific with numbers and timing.

    Forecast data:
    {forecast_json}

    Return JSON with:
    - explanation: string (2-3 paragraph readable summary)
    - urgency_level: string ("immediate", "soon", "planned", "no_action")
    - confidence: float (0.0-1.0)

thresholds:
  # Number of historical periods for moving average
  moving_avg_periods: 4
  # Safety stock multiplier (weeks of average demand)
  safety_stock_weeks: 2
  # Lead time in days for reorder
  lead_time_days: 7
  # Critical threshold: below this many days of stock = immediate alert
  critical_days_of_stock: 3

# Industry Research (Lokad, Inventory Planner, Prediko)
# - 2-5% of revenue lost to stockouts
# - 20-30% excess inventory carrying costs
# - Excel can't handle seasonality, lead times, or safety stock automatically
# - Manual forecasting prone to human bias and errors
# Manual process: 75-125 min/analysis (export, calculate, identify, prioritize, compile)
# Automated: <10 sec/analysis (99.9% time reduction)
# ROI: $15,000-75,000/year in stockout prevention + carrying cost reduction

industry_benchmarks:
  revenue_lost_to_stockouts: [0.02, 0.05]  # 2-5%
  excess_inventory_carrying_cost: [0.20, 0.30]  # 20-30%
  manual_process_minutes: [75, 125]
  forecast_accuracy_manual: 0.65  # 65%
  forecast_accuracy_automated: 0.85  # 85%

forecasting_methods:
  simple_moving_average:
    periods: 4
    best_for: "stable_demand"
  weighted_moving_average:
    weights: [0.4, 0.3, 0.2, 0.1]
    best_for: "trending_demand"
  exponential_smoothing:
    alpha: 0.3
    best_for: "noisy_data"
  seasonal_adjustment:
    enabled: true
    best_for: "seasonal_products"

reorder_point_formula:
  # ROP = (Average Daily Sales × Lead Time) + Safety Stock
  # Safety Stock = Z-score × √Lead Time × Demand Std Dev
  z_score_service_level:
    95_percent: 1.65
    99_percent: 2.33

urgency_classification:
  immediate:
    days_of_stock_under: 3
    action: "order_now"
    color: "red"
  soon:
    days_of_stock_under: 7
    action: "order_within_24h"
    color: "orange"
  planned:
    days_of_stock_under: 14
    action: "add_to_next_order"
    color: "yellow"
  healthy:
    days_of_stock_over: 14
    action: "monitor"
    color: "green"

roi_calculation:
  time_saved_per_analysis_minutes: 100  # avg of 75-125
  analyses_per_week: 5
  stockout_prevention_value: [10000, 50000]  # $/year
  carrying_cost_reduction: [5000, 25000]  # $/year
  annual_value: [15000, 75000]
