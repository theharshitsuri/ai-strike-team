# Warranty Claim Processing — Config
workflow_name: warranty_claims
description: "Parse claim forms → validate against warranty rules → approve/reject/review"

extraction:
  model: "gpt-4o"
  temperature: 0.1
  confidence_threshold: 0.80

prompts:
  system: |
    You are a warranty claims processing agent. Extract claim details from forms
    and documents with precision. Product IDs, dates, and serial numbers must be exact.
    Return valid JSON only.

  extraction: |
    Extract warranty claim information from this document. Return ONLY valid JSON.

    Fields:
    - claim_id: string (claim number if present, else "N/A")
    - customer_name: string
    - customer_email: string (if available, else "N/A")
    - product_id: string (product model/SKU)
    - serial_number: string (if available, else "N/A")
    - purchase_date: string (YYYY-MM-DD)
    - claim_date: string (YYYY-MM-DD, today if not specified)
    - issue_type: string (one of: "defect", "malfunction", "damage", "missing_parts", "performance", "other")
    - issue_description: string (brief description of the problem)
    - requested_resolution: string (one of: "replacement", "repair", "refund", "credit")
    - attachments_mentioned: boolean (whether photos/docs were mentioned)
    - confidence: float (0.0-1.0)

    Claim document:
    {input_text}

thresholds:
  # Warranty period in days from purchase date
  warranty_period_days: 365
  # Extended warranty period (if applicable)
  extended_warranty_days: 730
  # Known valid product prefixes
  valid_product_prefixes: ["PRD-", "SKU-", "MDL-"]
  # Max claim amount for auto-approval
  auto_approve_max_days: 90
  # Max claim value for auto-approval
  max_auto_approve_value: 500
  # Review threshold for high-value claims
  review_over_value: 200

# Industry Research (Auditec Solutions, ReturnLogic, Liferay)
# - 10 touchpoints average per manual warranty return
# - 15 minutes average handling time per claim
# - $5 cost per claim for manual processing
# - $6.24 billion global warranty management market by 2031
# - Automated systems reduce processing time by 90%
# Manual process: 32-60 min/claim (receive, extract, validate, decide, respond)
# Automated: <10 sec/claim (99.7% time reduction)
# ROI: 10x faster processing, 80% backlog reduction

industry_benchmarks:
  manual_touchpoints: 10
  manual_handling_minutes: 15
  manual_cost_per_claim: 5.00  # $5
  automated_cost_per_claim: 0.50  # $0.50
  manual_process_minutes: [32, 60]
  global_market_size_2031: 6240000000  # $6.24B

decision_rules:
  auto_approve:
    - days_since_purchase_under: 90
    - claim_value_under: 500
    - issue_type_in: ["defect", "malfunction"]
    - no_previous_claims: true
  auto_reject:
    - warranty_expired: true
    - invalid_product_id: true
    - serial_number_mismatch: true
  manual_review:
    - days_since_purchase_over: 270  # Near warranty end
    - claim_value_over: 200
    - issue_type_in: ["damage", "performance"]
    - multiple_previous_claims: true

validation_checks:
  - product_id_format
  - serial_number_exists
  - purchase_date_valid
  - warranty_not_expired
  - no_duplicate_claim
  - issue_type_covered

roi_calculation:
  time_saved_per_claim_minutes: 45  # avg of 32-60
  claims_per_day: 50
  cost_reduction_percentage: 0.90  # 90%
  backlog_reduction: 0.80  # 80%
  annual_value: [12000, 36000]
