# Generic Scheduling Automation — Config
workflow_name: scheduling_automation
description: "Parse scheduling requests → check availability → optimize slots → confirm"

extraction:
  model: "gpt-4o"
  temperature: 0.1
  confidence_threshold: 0.80

prompts:
  system: |
    You are a scheduling automation agent. Parse free-text scheduling requests
    and extract structured appointment data. Handle various date/time formats.
    Return valid JSON only.

  extraction: |
    Extract scheduling request information from this text. Return ONLY valid JSON.

    Fields:
    - request_id: string (generate if not provided, format "SCH-XXXXX")
    - requester_name: string
    - requester_email: string (if available, else "N/A")
    - request_type: string (one of: "meeting", "delivery", "service_call", "inspection", "pickup", "installation", "other")
    - preferred_date: string (YYYY-MM-DD)
    - preferred_time: string (HH:MM 24h format)
    - duration_minutes: integer (estimated duration, default 60)
    - location: string
    - participants: array of strings (names of people involved)
    - priority: string (one of: "high", "normal", "low")
    - notes: string (any special requirements or "N/A")
    - flexibility: string (one of: "exact", "flexible_time", "flexible_date", "fully_flexible")
    - confidence: float (0.0-1.0)

    Scheduling request:
    {input_text}

  confirmation_message: |
    Write a brief, professional scheduling confirmation message.

    Details:
    - Type: {request_type}
    - Date: {date}
    - Time: {time}
    - Duration: {duration} minutes
    - Location: {location}
    - Participants: {participants}

    Return JSON with:
    - subject: string
    - body: string
    - confidence: float (0.0-1.0)

thresholds:
  # Business hours
  business_start_hour: 8
  business_end_hour: 18
  # Minimum gap between appointments (minutes)
  min_gap_minutes: 15
  # Maximum scheduling days in advance
  max_advance_days: 90

# Industry Research (Calendly, Acuity, Dialzara)
# - 24/7 availability expected by customers
# - 20-30% of appointments require rescheduling
# - 5-10% no-show rate without reminders
# - $50-150 cost per double-booking or missed appointment
# - Automated systems eliminate double-bookings entirely
# Manual process: 24-45 min/appointment (receive, parse, check, propose, confirm, create, send)
# Automated: <10 sec/appointment (99.6% time reduction)
# ROI: $500-1,500/month in double-booking prevention

industry_benchmarks:
  reschedule_rate: [0.20, 0.30]  # 20-30%
  no_show_rate_without_reminders: [0.05, 0.10]  # 5-10%
  no_show_rate_with_reminders: 0.02  # 2%
  double_booking_cost: [50, 150]  # $
  manual_process_minutes: [24, 45]

request_types:
  meeting:
    default_duration_minutes: 60
    buffer_minutes: 15
    allow_recurring: true
  service_call:
    default_duration_minutes: 120
    buffer_minutes: 30
    allow_recurring: false
  inspection:
    default_duration_minutes: 90
    buffer_minutes: 15
    allow_recurring: true
  delivery:
    default_duration_minutes: 30
    buffer_minutes: 15
    allow_recurring: false
  installation:
    default_duration_minutes: 240
    buffer_minutes: 60
    allow_recurring: false

availability_rules:
  check_calendar_conflicts: true
  check_resource_availability: true
  respect_business_hours: true
  allow_overtime_booking: false
  max_appointments_per_day: 8

confirmation_features:
  send_immediate_confirmation: true
  send_reminder_24h: true
  send_reminder_1h: true
  include_calendar_invite: true
  include_location_map: true
  include_cancellation_link: true

roi_calculation:
  time_saved_per_appointment_minutes: 35  # avg of 24-45
  appointments_per_day: 10
  double_booking_elimination: 1.0  # 100%
  monthly_savings: [500, 1500]
  annual_value: [6000, 18000]
